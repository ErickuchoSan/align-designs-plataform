name: Deploy to Development

on:
  push:
    branches:
      - main

# Prevent concurrent deployments to avoid conflicts
concurrency:
  group: deploy-dev
  cancel-in-progress: false

# Minimum required permissions (security best practice)
permissions:
  contents: read
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Centralized configuration (DRY principle)
  DEV_SERVER_IP: '144.126.221.76'
  SSH_PORT: '29'

jobs:
  # Job 1: Build Validation + Tests + Security Audit
  validate:
    name: Build, Test & Security
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter backend exec prisma generate

      - name: Lint Backend
        run: pnpm --filter backend lint

      - name: Lint Frontend
        run: pnpm --filter frontend lint

      - name: Run Backend Tests with Coverage
        run: pnpm --filter backend test:cov

      - name: Run Frontend Tests with Coverage
        run: pnpm --filter frontend test:coverage

      - name: Upload Coverage Reports
        uses: codecov/codecov-action@v4
        with:
          files: apps/backend/coverage/lcov.info,apps/frontend/coverage/lcov.info
          fail_ci_if_error: false
        continue-on-error: true

      - name: Build Frontend
        run: pnpm --filter frontend build
        env:
          NEXT_PUBLIC_API_URL: /api/v1

      - name: Build Backend
        run: pnpm --filter backend build

      - name: Security audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

  # Job 2: SonarCloud Analysis
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # Job 3: Deploy
  deploy:
    name: Deploy to Dev Server
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [validate, sonarcloud]
    steps:
      - name: Deploy to Dev Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 144.126.221.76
          username: root
          port: 29
          key: ${{ secrets.DEV_SERVER_SSH_KEY }}
          script: |
            cd /var/www/align-designs
            git pull origin main

            # Create frontend .env.local (not tracked by git)
            echo 'NEXT_PUBLIC_API_URL=http://144.126.221.76/api' > apps/frontend/.env.local

            # Stop old containers, rebuild and start
            docker compose -f docker-compose.dev.yml --env-file .env.dev down
            docker compose -f docker-compose.dev.yml --env-file .env.dev up -d --build

            # Run Prisma migrations inside backend container
            echo "Running database migrations..."
            docker exec backend-dev npx prisma migrate deploy || echo "Migration failed or no pending migrations"

            # Ensure backend is running (sometimes doesn't start after build)
            sleep 5
            if [ "$(docker inspect -f '{{.State.Running}}' backend-dev 2>/dev/null)" != "true" ]; then
              echo "Backend not running, starting it..."
              docker compose -f docker-compose.dev.yml --env-file .env.dev up -d backend-dev
            fi

            # Verify all 3 containers are running (frontend, backend, postgres)
            echo "Verifying all containers are running..."
            EXPECTED_CONTAINERS=("frontend-dev" "backend-dev" "postgres-dev")
            MISSING_CONTAINERS=()

            for container in "${EXPECTED_CONTAINERS[@]}"; do
              if [ "$(docker inspect -f '{{.State.Running}}' $container 2>/dev/null)" != "true" ]; then
                echo "Container $container is NOT running!"
                MISSING_CONTAINERS+=("$container")
              else
                echo "Container $container is running ✓"
              fi
            done

            # If any container is missing, restart all services
            if [ ${#MISSING_CONTAINERS[@]} -gt 0 ]; then
              echo "Missing containers detected: ${MISSING_CONTAINERS[*]}"
              echo "Restarting all services..."
              docker compose -f docker-compose.dev.yml --env-file .env.dev up -d
              sleep 10
            fi

            # Wait for backend to be ready
            echo "Waiting for backend to start..."
            for i in {1..30}; do
              if curl -s http://localhost:3001/api/v1/health > /dev/null 2>&1; then
                echo "Backend is healthy!"
                break
              fi
              sleep 2
            done

            # Final container status
            echo "Final container status:"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            # Verify ALL 3 required containers are running before cleanup
            RUNNING_COUNT=0
            for container in frontend-dev backend-dev postgres-dev; do
              if [ "$(docker inspect -f '{{.State.Running}}' $container 2>/dev/null)" == "true" ]; then
                RUNNING_COUNT=$((RUNNING_COUNT + 1))
              fi
            done

            if [ $RUNNING_COUNT -eq 3 ]; then
              echo "All 3 containers confirmed running. Safe to cleanup unused images..."
              docker system prune -a -f
              echo "Cleanup completed."
            else
              echo "WARNING: Only $RUNNING_COUNT/3 containers running. Skipping cleanup to avoid removing needed images."
            fi

            echo "Deployed at $(date)"

  # Job 5: Health Check
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for containers to start
        run: sleep 45

      - name: Check Backend Health
        id: backend_health
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" http://144.126.221.76/api/v1/health)
          if [ "$response" != "200" ]; then
            echo "::error::Backend health check failed! Status: $response"
            echo "backend_failed=true" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "Backend health check passed! Status: $response"

      - name: Check Frontend Health
        id: frontend_health
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" http://144.126.221.76)
          if [ "$response" != "200" ]; then
            echo "::error::Frontend health check failed! Status: $response"
            echo "frontend_failed=true" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "Frontend health check passed! Status: $response"

  # Job 5b: Rollback on Health Check Failure
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: health-check
    if: failure()
    steps:
      - name: Rollback to Previous Version
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 144.126.221.76
          username: root
          port: 29
          key: ${{ secrets.DEV_SERVER_SSH_KEY }}
          script: |
            cd /var/www/align-designs
            echo "::warning::Health check failed! Rolling back..."

            # Get the previous commit
            PREVIOUS_COMMIT=$(git rev-parse HEAD~1)
            echo "Rolling back to commit: $PREVIOUS_COMMIT"

            # Rollback to previous commit
            git checkout $PREVIOUS_COMMIT

            # Rebuild and restart containers
            docker compose -f docker-compose.dev.yml --env-file .env.dev down
            docker compose -f docker-compose.dev.yml --env-file .env.dev up -d --build

            # Wait for services
            sleep 30

            # Verify rollback worked
            if curl -s http://localhost:3001/api/v1/health > /dev/null 2>&1; then
              echo "Rollback successful! Services are healthy."
            else
              echo "::error::Rollback failed! Manual intervention required."
              exit 1
            fi

            echo "Rolled back at $(date)"

  # Job 6: Full Backup to DigitalOcean Spaces (after successful deploy)
  backup:
    name: Full Backup to Cloud
    runs-on: ubuntu-latest
    needs: health-check
    if: success()
    steps:
      - name: Backup DB, Docker Images & SSH Config to Spaces
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 144.126.221.76
          username: root
          port: 29
          key: ${{ secrets.DEV_SERVER_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            BACKUP_DIR="/var/www/align-designs/backups"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)

            echo "=== Creating backup directory ==="
            mkdir -p "$BACKUP_DIR"

            echo "=== Ensuring containers are running ==="
            cd /var/www/align-designs

            # Check if containers are running, if not start them
            if ! docker ps --format '{{.Names}}' | grep -q postgres-dev; then
              echo "Containers not running, starting them..."
              docker compose -f docker-compose.dev.yml --env-file .env.dev up -d
              sleep 30
            fi

            # Verify containers are running
            for container in postgres-dev backend-dev frontend-dev; do
              if ! docker ps --format '{{.Names}}' | grep -q $container; then
                echo "ERROR: $container is not running!"
                exit 1
              fi
              echo "$container is running ✓"
            done

            echo "=== Backing up PostgreSQL database ==="
            docker exec postgres-dev pg_dump -U aligndesigns_dev aligndesigns_dev > "$BACKUP_DIR/database.sql"
            echo "Database backup created"

            echo "=== Saving Docker images (this may take a while) ==="
            docker save frontend-dev:latest 2>/dev/null | gzip > "$BACKUP_DIR/frontend-dev.tar.gz" || echo "No frontend image"
            docker save backend-dev:latest 2>/dev/null | gzip > "$BACKUP_DIR/backend-dev.tar.gz" || echo "No backend image"

            echo "=== Backing up SSH config ==="
            cp /etc/ssh/sshd_config "$BACKUP_DIR/sshd_config"

            echo "=== Installing/configuring AWS CLI for Spaces ==="
            if ! command -v aws &> /dev/null; then
              curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "/tmp/awscliv2.zip"
              unzip -q /tmp/awscliv2.zip -d /tmp
              /tmp/aws/install --update
              rm -rf /tmp/awscliv2.zip /tmp/aws
            fi

            # Configure AWS CLI for DigitalOcean Spaces
            export AWS_ACCESS_KEY_ID="${{ secrets.STORAGE_ACCESS_KEY }}"
            export AWS_SECRET_ACCESS_KEY="${{ secrets.STORAGE_SECRET_KEY }}"
            export AWS_DEFAULT_REGION="sfo3"

            S3_ENDPOINT="https://sfo3.digitaloceanspaces.com"
            BUCKET="aligndesigns-dev"
            BACKUP_PREFIX="backups/dev"

            echo "=== Uploading to DigitalOcean Spaces ==="
            aws s3 cp "$BACKUP_DIR/database.sql" "s3://$BUCKET/$BACKUP_PREFIX/database.sql" --endpoint-url "$S3_ENDPOINT"
            [ -f "$BACKUP_DIR/frontend-dev.tar.gz" ] && aws s3 cp "$BACKUP_DIR/frontend-dev.tar.gz" "s3://$BUCKET/$BACKUP_PREFIX/frontend-dev.tar.gz" --endpoint-url "$S3_ENDPOINT" || true
            [ -f "$BACKUP_DIR/backend-dev.tar.gz" ] && aws s3 cp "$BACKUP_DIR/backend-dev.tar.gz" "s3://$BUCKET/$BACKUP_PREFIX/backend-dev.tar.gz" --endpoint-url "$S3_ENDPOINT" || true
            aws s3 cp "$BACKUP_DIR/sshd_config" "s3://$BUCKET/$BACKUP_PREFIX/sshd_config" --endpoint-url "$S3_ENDPOINT"

            # Upload a metadata file with timestamp
            echo "Backup created at: $TIMESTAMP" > "$BACKUP_DIR/backup_info.txt"
            echo "Server: dev (144.126.221.76)" >> "$BACKUP_DIR/backup_info.txt"
            aws s3 cp "$BACKUP_DIR/backup_info.txt" "s3://$BUCKET/$BACKUP_PREFIX/backup_info.txt" --endpoint-url "$S3_ENDPOINT"

            echo "=== Cleaning up local backup files ==="
            rm -f "$BACKUP_DIR/frontend-dev.tar.gz" "$BACKUP_DIR/backend-dev.tar.gz"

            # Keep only last 2 DB backups locally
            cd "$BACKUP_DIR" && ls -t *.sql 2>/dev/null | tail -n +3 | xargs -r rm -- || true

            echo "=== Backup completed and uploaded to Spaces at $(date) ==="
            aws s3 ls "s3://$BUCKET/$BACKUP_PREFIX/" --endpoint-url "$S3_ENDPOINT"

  # Job 7: Lighthouse Performance Audit (only runs if health check passed)
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    needs: backup
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://144.126.221.76
            http://144.126.221.76/login
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true

  # Job 8: E2E Tests with Playwright (optional - requires credentials)
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: backup
    if: success() && vars.E2E_ADMIN_PASSWORD != ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: npx playwright install chromium

      - name: Run E2E Tests
        run: pnpm test:e2e
        env:
          E2E_BASE_URL: http://144.126.221.76
          E2E_ADMIN_PASSWORD: ${{ vars.E2E_ADMIN_PASSWORD }}
        continue-on-error: true

      - name: Upload E2E Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

