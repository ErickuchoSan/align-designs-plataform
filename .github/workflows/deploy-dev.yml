name: Deploy to Dev & Production

on:
  push:
    branches:
      - main

jobs:
  # Job 1: Build Validation + Tests + Security Audit
  validate:
    name: Build, Test & Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint Backend
        run: pnpm --filter backend lint

      - name: Lint Frontend
        run: pnpm --filter frontend lint

      - name: Generate Prisma Client
        run: pnpm --filter backend exec prisma generate

      - name: Run Backend Tests with Coverage
        run: pnpm --filter backend test:cov

      - name: Run Frontend Tests with Coverage
        run: pnpm --filter frontend test:coverage

      - name: Upload Coverage Reports
        uses: codecov/codecov-action@v4
        with:
          files: apps/backend/coverage/lcov.info,apps/frontend/coverage/lcov.info
          fail_ci_if_error: false
        continue-on-error: true

      - name: Build Frontend
        run: pnpm --filter frontend build
        env:
          NEXT_PUBLIC_API_URL: /api/v1

      - name: Build Backend
        run: pnpm --filter backend build

      - name: Security audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

  # Job 2: SonarCloud Analysis
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # Job 3: Database Backup
  backup:
    name: Database Backup
    runs-on: ubuntu-latest
    steps:
      - name: Backup PostgreSQL
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 144.126.221.76
          username: root
          port: 29
          key: ${{ secrets.DEV_SERVER_SSH_KEY }}
          script: |
            # Create backup directory if not exists
            mkdir -p /var/www/align-designs/backups

            # Backup database with timestamp
            docker exec postgres-dev pg_dump -U aligndesigns_dev aligndesigns_dev > /var/www/align-designs/backups/db_$(date +%Y%m%d_%H%M%S).sql

            # Keep only last 5 backups
            cd /var/www/align-designs/backups && ls -t *.sql | tail -n +6 | xargs -r rm --

            echo "Backup completed at $(date)"

  # Job 4: Deploy
  deploy:
    name: Deploy to Dev Server
    runs-on: ubuntu-latest
    needs: [validate, sonarcloud, backup]
    steps:
      - name: Deploy to Dev Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 144.126.221.76
          username: root
          port: 29
          key: ${{ secrets.DEV_SERVER_SSH_KEY }}
          script: |
            cd /var/www/align-designs
            git pull origin main

            # Create frontend .env.local (not tracked by git)
            echo 'NEXT_PUBLIC_API_URL=http://144.126.221.76/api' > apps/frontend/.env.local

            # Stop old containers, rebuild and start
            docker compose -f docker-compose.dev.yml --env-file .env.dev down
            docker compose -f docker-compose.dev.yml --env-file .env.dev up -d --build

            # Run Prisma migrations inside backend container
            echo "Running database migrations..."
            docker exec backend-dev npx prisma migrate deploy || echo "Migration failed or no pending migrations"

            # Clean up old Docker images to free disk space
            echo "Cleaning up unused Docker images..."
            docker image prune -af --filter "until=24h"

            # Ensure backend is running (sometimes doesn't start after build)
            sleep 5
            if [ "$(docker inspect -f '{{.State.Running}}' backend-dev 2>/dev/null)" != "true" ]; then
              echo "Backend not running, starting it..."
              docker compose -f docker-compose.dev.yml --env-file .env.dev up -d backend-dev
            fi

            # Wait for backend to be ready
            echo "Waiting for backend to start..."
            for i in {1..30}; do
              if curl -s http://localhost:3001/api/v1/health > /dev/null 2>&1; then
                echo "Backend is healthy!"
                break
              fi
              sleep 2
            done

            echo "Deployed at $(date)"

  # Job 5: Health Check
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for containers to start
        run: sleep 45

      - name: Check Backend Health
        id: backend_health
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" http://144.126.221.76/api/v1/health)
          if [ "$response" != "200" ]; then
            echo "::error::Backend health check failed! Status: $response"
            echo "backend_failed=true" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "Backend health check passed! Status: $response"

      - name: Check Frontend Health
        id: frontend_health
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" http://144.126.221.76)
          if [ "$response" != "200" ]; then
            echo "::error::Frontend health check failed! Status: $response"
            echo "frontend_failed=true" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "Frontend health check passed! Status: $response"

  # Job 5b: Rollback on Health Check Failure
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: health-check
    if: failure()
    steps:
      - name: Rollback to Previous Version
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 144.126.221.76
          username: root
          port: 29
          key: ${{ secrets.DEV_SERVER_SSH_KEY }}
          script: |
            cd /var/www/align-designs
            echo "::warning::Health check failed! Rolling back..."

            # Get the previous commit
            PREVIOUS_COMMIT=$(git rev-parse HEAD~1)
            echo "Rolling back to commit: $PREVIOUS_COMMIT"

            # Rollback to previous commit
            git checkout $PREVIOUS_COMMIT

            # Rebuild and restart containers
            docker compose -f docker-compose.dev.yml --env-file .env.dev down
            docker compose -f docker-compose.dev.yml --env-file .env.dev up -d --build

            # Wait for services
            sleep 30

            # Verify rollback worked
            if curl -s http://localhost:3001/api/v1/health > /dev/null 2>&1; then
              echo "Rollback successful! Services are healthy."
            else
              echo "::error::Rollback failed! Manual intervention required."
              exit 1
            fi

            echo "Rolled back at $(date)"

  # Job 6: Lighthouse Performance Audit (only runs if health check passed)
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    needs: health-check
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://144.126.221.76
            http://144.126.221.76/login
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true

  # Job 7: E2E Tests with Playwright (optional - requires credentials)
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: health-check
    if: success() && vars.E2E_ADMIN_PASSWORD != ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: npx playwright install chromium

      - name: Run E2E Tests
        run: pnpm test:e2e
        env:
          E2E_BASE_URL: http://144.126.221.76
          E2E_ADMIN_PASSWORD: ${{ vars.E2E_ADMIN_PASSWORD }}
        continue-on-error: true

      - name: Upload E2E Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ============================================================
  # PRODUCTION DEPLOYMENT (automatic after dev passes)
  # ============================================================

  # Job 8: Backup Production
  backup-prod:
    name: Backup Production
    runs-on: ubuntu-latest
    needs: health-check
    if: success()
    steps:
      - name: Full System Backup
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 64.23.223.235
          username: root
          port: 29
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          script: |
            set -e
            BACKUP_DIR="/var/backups/align-designs"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            BACKUP_PATH="$BACKUP_DIR/$TIMESTAMP"

            echo "=== Creating backup directory ==="
            mkdir -p "$BACKUP_PATH"

            echo "=== Backing up PostgreSQL database ==="
            docker exec postgres-prod pg_dump -U aligndesigns_prod aligndesigns_prod > "$BACKUP_PATH/database.sql" || echo "No DB container yet"

            echo "=== Saving Docker images ==="
            docker save backend-prod:latest > "$BACKUP_PATH/backend-image.tar" 2>/dev/null || echo "No backend image yet"
            docker save frontend-prod:latest > "$BACKUP_PATH/frontend-image.tar" 2>/dev/null || echo "No frontend image yet"

            echo "=== Saving docker-compose state ==="
            cp /var/www/align-designs-prod/docker-compose.prod.yml "$BACKUP_PATH/" 2>/dev/null || echo "No compose file yet"
            cp /var/www/align-designs-prod/.env.prod "$BACKUP_PATH/" 2>/dev/null || echo "No env file yet"

            echo "=== Compressing backup ==="
            cd "$BACKUP_DIR"
            tar -czf "$TIMESTAMP.tar.gz" "$TIMESTAMP"
            rm -rf "$TIMESTAMP"

            echo "=== Cleanup old backups (keep last 5) ==="
            ls -t $BACKUP_DIR/*.tar.gz 2>/dev/null | tail -n +6 | xargs -r rm --

            echo "=== Backup complete: $TIMESTAMP.tar.gz ==="
            ls -lh "$BACKUP_DIR"

  # Job 9: Deploy to Production
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: backup-prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 64.23.223.235
          username: root
          port: 29
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          source: "apps/,docker-compose.prod.yml,package.json,pnpm-lock.yaml,pnpm-workspace.yaml,turbo.json"
          target: /var/www/align-designs-prod/
          overwrite: true

      - name: Build and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 64.23.223.235
          username: root
          port: 29
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          script: |
            set -e
            cd /var/www/align-designs-prod

            echo "=== Ensuring .env symlink exists ==="
            ln -sf .env.prod .env

            echo "=== Creating Docker network if not exists ==="
            docker network create web-proxy 2>/dev/null || true

            echo "=== Building and starting containers ==="
            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d

            echo "=== Waiting for services to start ==="
            sleep 30

            echo "=== Running database migrations ==="
            docker exec backend-prod npx prisma migrate deploy || echo "Migrations may have already been applied"

            echo "=== Cleaning up old Docker images ==="
            docker image prune -af --filter "until=24h"

            echo "=== Checking container status ==="
            docker ps

            echo "=== Production deployment complete ==="

  # Job 10: Production Health Check
  health-check-prod:
    name: Production Health Check
    runs-on: ubuntu-latest
    needs: deploy-prod
    steps:
      - name: Wait for services
        run: sleep 15

      - name: Check Backend Health
        run: |
          for i in {1..10}; do
            response=$(curl -s -o /dev/null -w "%{http_code}" -H "Origin: https://aligndesignsllc.com" https://aligndesignsllc.com/api/v1/health || echo "000")
            if [ "$response" = "200" ]; then
              echo "Production backend is healthy!"
              exit 0
            fi
            echo "Attempt $i: Backend returned $response, retrying..."
            sleep 10
          done
          echo "Production backend health check failed!"
          exit 1

      - name: Check Frontend
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://aligndesignsllc.com)
          if [ "$response" = "200" ]; then
            echo "Production frontend is healthy!"
          else
            echo "Production frontend returned $response"
            exit 1
          fi

      - name: Deployment Success
        if: success()
        run: |
          echo "============================================"
          echo "  DEPLOYMENT SUCCESSFUL TO BOTH ENVIRONMENTS"
          echo "============================================"
          echo "Development: http://144.126.221.76"
          echo "Production:  https://aligndesignsllc.com"

  # Job 11: Rollback Production on Failure
  rollback-prod:
    name: Rollback Production
    runs-on: ubuntu-latest
    needs: health-check-prod
    if: failure()
    steps:
      - name: Rollback to Previous Version
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 64.23.223.235
          username: root
          port: 29
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          script: |
            set -e
            BACKUP_DIR="/var/backups/align-designs"

            echo "::warning::Production health check failed! Rolling back..."

            # Get the latest backup
            LATEST_BACKUP=$(ls -t $BACKUP_DIR/*.tar.gz 2>/dev/null | head -1)

            if [ -z "$LATEST_BACKUP" ]; then
              echo "ERROR: No backup found for rollback!"
              exit 1
            fi

            BACKUP_NAME=$(basename "$LATEST_BACKUP" .tar.gz)
            echo "Rolling back to: $BACKUP_NAME"

            # Extract backup
            cd $BACKUP_DIR
            tar -xzf "$LATEST_BACKUP"

            # Stop current containers
            cd /var/www/align-designs-prod
            docker compose -f docker-compose.prod.yml down || true

            # Restore Docker images
            docker load < "$BACKUP_DIR/$BACKUP_NAME/backend-image.tar" || echo "No backend image"
            docker load < "$BACKUP_DIR/$BACKUP_NAME/frontend-image.tar" || echo "No frontend image"

            # Restore database
            docker compose -f docker-compose.prod.yml up -d postgres-prod
            sleep 10
            docker exec -i postgres-prod psql -U aligndesigns_prod aligndesigns_prod < "$BACKUP_DIR/$BACKUP_NAME/database.sql" || echo "DB restore failed"

            # Start services
            docker compose -f docker-compose.prod.yml up -d

            # Cleanup extracted backup
            rm -rf "$BACKUP_DIR/$BACKUP_NAME"

            # Verify rollback
            sleep 30
            if curl -s -H "Origin: https://aligndesignsllc.com" https://aligndesignsllc.com/api/v1/health > /dev/null 2>&1; then
              echo "Production rollback successful!"
            else
              echo "::error::Production rollback failed! Manual intervention required."
              exit 1
            fi
