name: Deploy to Production

# ============================================================
# PRODUCTION DEPLOYMENT
#
# Use this workflow to deploy to production AFTER verifying
# that development is working correctly.
#
# Workflow:
# 1. Push to main → deploys to development automatically
# 2. Verify dev works, show to client if needed
# 3. Run this workflow → deploys to production
#
# Options:
# - skip_backup: Skip backup (not recommended)
# - rollback_to: Rollback to a specific backup
# ============================================================

on:
  workflow_dispatch:
    inputs:
      skip_backup:
        description: 'Skip backup (not recommended)'
        required: false
        default: false
        type: boolean
      rollback_to:
        description: 'Rollback to specific backup (leave empty for new deploy)'
        required: false
        default: ''
        type: string

# Prevent concurrent production deployments (CRITICAL)
concurrency:
  group: deploy-prod
  cancel-in-progress: false

# Minimum required permissions (security best practice)
permissions:
  contents: read
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Centralized configuration
  PROD_SERVER_IP: '64.23.223.235'
  SSH_PORT: '29'

jobs:
  # Job 1: Verify Dev Pipeline Passed (including SonarCloud)
  verify-dev:
    name: Verify Development Pipeline Passed
    runs-on: ubuntu-latest
    steps:
      - name: Verify last dev workflow succeeded
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Checking last development pipeline status ==="

          # Get the last workflow run for deploy-dev.yml
          LAST_RUN=$(gh api repos/${{ github.repository }}/actions/workflows/deploy-dev.yml/runs \
            --jq '.workflow_runs[0] | {status: .status, conclusion: .conclusion, head_sha: .head_sha, html_url: .html_url}')

          STATUS=$(echo "$LAST_RUN" | jq -r '.status')
          CONCLUSION=$(echo "$LAST_RUN" | jq -r '.conclusion')
          SHA=$(echo "$LAST_RUN" | jq -r '.head_sha')
          URL=$(echo "$LAST_RUN" | jq -r '.html_url')

          echo "Last dev pipeline:"
          echo "  Status: $STATUS"
          echo "  Conclusion: $CONCLUSION"
          echo "  Commit: $SHA"
          echo "  URL: $URL"

          # Check if the workflow is still running
          if [ "$STATUS" != "completed" ]; then
            echo "::error::Development pipeline is still running. Wait for it to complete."
            exit 1
          fi

          # Check if the workflow succeeded
          if [ "$CONCLUSION" != "success" ]; then
            echo "::error::Development pipeline failed! SonarCloud or tests may have errors."
            echo "::error::Fix the issues in dev before deploying to production."
            echo "::error::See: $URL"
            exit 1
          fi

          echo "✅ Development pipeline passed (including SonarCloud)"
          echo "Production deployment authorized"

  # Job 6: Create Full Backup to DigitalOcean Spaces (after successful deploy)
  backup:
    name: Full Backup to Cloud
    runs-on: ubuntu-latest
    needs: health-check
    if: ${{ success() && github.event.inputs.skip_backup != 'true' && github.event.inputs.rollback_to == '' }}
    steps:
      - name: Backup DB, Docker Images & SSH Config to Spaces
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: 64.23.223.235
          username: root
          port: 29
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            BACKUP_DIR="/var/backups/align-designs"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)

            echo "=== Creating backup directory ==="
            mkdir -p "$BACKUP_DIR"

            echo "=== Ensuring containers are running ==="
            cd /var/www/align-designs-prod

            # Check if containers are running, if not start them
            if ! docker ps --format '{{.Names}}' | grep -q postgres-prod; then
              echo "Containers not running, starting them..."
              docker compose -f docker-compose.prod.yml up -d
              sleep 30
            fi

            # Verify containers are running
            for container in postgres-prod backend-prod frontend-prod; do
              if ! docker ps --format '{{.Names}}' | grep -q $container; then
                echo "ERROR: $container is not running!"
                exit 1
              fi
              echo "$container is running ✓"
            done

            echo "=== Backing up PostgreSQL database ==="
            docker exec postgres-prod pg_dump -U aligndesigns_prod aligndesigns_prod > "$BACKUP_DIR/database.sql"
            echo "Database backup created"

            echo "=== Saving Docker images (this may take a while) ==="
            # Docker Compose names images as {directory}-{service}
            docker save align-designs-prod-frontend-prod:latest 2>/dev/null | gzip > "$BACKUP_DIR/frontend-prod.tar.gz" || echo "No frontend image"
            docker save align-designs-prod-backend-prod:latest 2>/dev/null | gzip > "$BACKUP_DIR/backend-prod.tar.gz" || echo "No backend image"

            echo "=== Backing up SSH config ==="
            cp /etc/ssh/sshd_config "$BACKUP_DIR/sshd_config"

            echo "=== Backing up docker-compose and env ==="
            cp /var/www/align-designs-prod/docker-compose.prod.yml "$BACKUP_DIR/" 2>/dev/null || echo "No compose file yet"
            cp /var/www/align-designs-prod/.env.prod "$BACKUP_DIR/env.prod.backup" 2>/dev/null || echo "No env file yet"

            echo "=== Installing/configuring AWS CLI for Spaces ==="
            if ! command -v aws &> /dev/null; then
              # Install unzip if not present
              if ! command -v unzip &> /dev/null; then
                apt-get update && apt-get install -y unzip
              fi
              curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "/tmp/awscliv2.zip"
              unzip -q /tmp/awscliv2.zip -d /tmp
              /tmp/aws/install --update
              rm -rf /tmp/awscliv2.zip /tmp/aws
            fi

            # Configure AWS CLI for DigitalOcean Spaces (using prod bucket credentials)
            export AWS_ACCESS_KEY_ID="${{ secrets.STORAGE_ACCESS_KEY_PROD }}"
            export AWS_SECRET_ACCESS_KEY="${{ secrets.STORAGE_SECRET_KEY_PROD }}"
            export AWS_DEFAULT_REGION="sfo3"

            S3_ENDPOINT="https://sfo3.digitaloceanspaces.com"
            BUCKET="aligndesigns-prod"
            BACKUP_PREFIX="backups"

            echo "=== Uploading to DigitalOcean Spaces ==="
            # Upload all backup files (overwrites previous backup)
            [ -f "$BACKUP_DIR/database.sql" ] && aws s3 cp "$BACKUP_DIR/database.sql" "s3://$BUCKET/$BACKUP_PREFIX/database.sql" --endpoint-url "$S3_ENDPOINT" || echo "No DB backup to upload"
            [ -f "$BACKUP_DIR/frontend-prod.tar.gz" ] && aws s3 cp "$BACKUP_DIR/frontend-prod.tar.gz" "s3://$BUCKET/$BACKUP_PREFIX/frontend-prod.tar.gz" --endpoint-url "$S3_ENDPOINT" || echo "No frontend image to upload"
            [ -f "$BACKUP_DIR/backend-prod.tar.gz" ] && aws s3 cp "$BACKUP_DIR/backend-prod.tar.gz" "s3://$BUCKET/$BACKUP_PREFIX/backend-prod.tar.gz" --endpoint-url "$S3_ENDPOINT" || echo "No backend image to upload"
            aws s3 cp "$BACKUP_DIR/sshd_config" "s3://$BUCKET/$BACKUP_PREFIX/sshd_config" --endpoint-url "$S3_ENDPOINT"
            [ -f "$BACKUP_DIR/docker-compose.prod.yml" ] && aws s3 cp "$BACKUP_DIR/docker-compose.prod.yml" "s3://$BUCKET/$BACKUP_PREFIX/docker-compose.prod.yml" --endpoint-url "$S3_ENDPOINT" || echo "No compose file to upload"
            [ -f "$BACKUP_DIR/env.prod.backup" ] && aws s3 cp "$BACKUP_DIR/env.prod.backup" "s3://$BUCKET/$BACKUP_PREFIX/env.prod.backup" --endpoint-url "$S3_ENDPOINT" || echo "No env file to upload"

            # Upload a metadata file with timestamp
            echo "Backup created at: $TIMESTAMP" > "$BACKUP_DIR/backup_info.txt"
            echo "Server: prod (64.23.223.235)" >> "$BACKUP_DIR/backup_info.txt"
            aws s3 cp "$BACKUP_DIR/backup_info.txt" "s3://$BUCKET/$BACKUP_PREFIX/backup_info.txt" --endpoint-url "$S3_ENDPOINT"

            echo "=== Cleaning up local backup files ==="
            rm -f "$BACKUP_DIR/frontend-prod.tar.gz" "$BACKUP_DIR/backend-prod.tar.gz"
            rm -f "$BACKUP_DIR/database.sql" "$BACKUP_DIR/sshd_config" "$BACKUP_DIR/backup_info.txt"

            # Keep only last 2 compressed backups locally (legacy cleanup)
            ls -t $BACKUP_DIR/*.tar.gz 2>/dev/null | tail -n +3 | xargs -r rm -- || true

            echo "=== Backup completed and uploaded to Spaces at $(date) ==="
            aws s3 ls "s3://$BUCKET/$BACKUP_PREFIX/" --endpoint-url "$S3_ENDPOINT"

  # Job 3: Rollback (if requested)
  rollback:
    name: Rollback to Previous Version
    runs-on: ubuntu-latest
    needs: verify-dev
    if: ${{ github.event.inputs.rollback_to != '' }}
    steps:
      - name: Perform Rollback
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: 64.23.223.235
          username: root
          port: 29
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          script: |
            set -e
            BACKUP_NAME="${{ github.event.inputs.rollback_to }}"
            BACKUP_DIR="/var/backups/align-designs"
            BACKUP_FILE="$BACKUP_DIR/$BACKUP_NAME.tar.gz"

            if [ ! -f "$BACKUP_FILE" ]; then
              echo "ERROR: Backup $BACKUP_FILE not found!"
              ls -la $BACKUP_DIR/
              exit 1
            fi

            echo "=== Extracting backup ==="
            cd $BACKUP_DIR
            tar -xzf "$BACKUP_FILE"

            echo "=== Stopping current containers ==="
            cd /var/www/align-designs-prod
            docker compose -f docker-compose.prod.yml down || true

            echo "=== Restoring Docker images ==="
            docker load < "$BACKUP_DIR/$BACKUP_NAME/backend-image.tar" || echo "No backend image in backup"
            docker load < "$BACKUP_DIR/$BACKUP_NAME/frontend-image.tar" || echo "No frontend image in backup"

            echo "=== Restoring database ==="
            docker compose -f docker-compose.prod.yml up -d postgres-prod
            sleep 10
            docker exec -i postgres-prod psql -U aligndesigns_prod aligndesigns_prod < "$BACKUP_DIR/$BACKUP_NAME/database.sql"

            echo "=== Starting services ==="
            docker compose -f docker-compose.prod.yml up -d

            echo "=== Cleanup ==="
            rm -rf "$BACKUP_DIR/$BACKUP_NAME"

            echo "=== Rollback complete ==="

  # Job 4: Deploy to Production
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production  # Allows setting up approval rules in GitHub
    needs: verify-dev
    if: ${{ needs.verify-dev.result == 'success' && github.event.inputs.rollback_to == '' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 64.23.223.235
          username: root
          port: 29
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          source: "apps/,docker-compose.prod.yml,package.json,pnpm-lock.yaml,pnpm-workspace.yaml,turbo.json"
          target: /var/www/align-designs-prod/
          overwrite: true

      - name: Build and Deploy
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: 64.23.223.235
          username: root
          port: 29
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          script: |
            set -e
            cd /var/www/align-designs-prod

            echo "=== Ensuring .env symlink exists ==="
            ln -sf .env.prod .env

            echo "=== Creating Docker network if not exists ==="
            docker network create web-proxy 2>/dev/null || true

            echo "=== Building and starting containers ==="
            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d

            echo "=== Waiting for services to start ==="
            sleep 30

            echo "=== Running database migrations ==="
            docker exec backend-prod npx prisma migrate deploy || echo "Migrations may have already been applied"

            echo "=== Checking container status ==="
            docker ps

            # Verify all 3 containers are running
            echo "Verifying all containers are running..."
            EXPECTED_CONTAINERS=("frontend-prod" "backend-prod" "postgres-prod")
            MISSING_CONTAINERS=()

            for container in "${EXPECTED_CONTAINERS[@]}"; do
              if [ "$(docker inspect -f '{{.State.Running}}' $container 2>/dev/null)" != "true" ]; then
                echo "Container $container is NOT running!"
                MISSING_CONTAINERS+=("$container")
              else
                echo "Container $container is running ✓"
              fi
            done

            # If any container is missing, restart all services
            if [ ${#MISSING_CONTAINERS[@]} -gt 0 ]; then
              echo "Missing containers detected: ${MISSING_CONTAINERS[*]}"
              echo "Restarting all services..."
              docker compose -f docker-compose.prod.yml up -d
              sleep 15
            fi

            # Verify ALL 3 required containers are running before cleanup
            RUNNING_COUNT=0
            for container in frontend-prod backend-prod postgres-prod; do
              if [ "$(docker inspect -f '{{.State.Running}}' $container 2>/dev/null)" == "true" ]; then
                RUNNING_COUNT=$((RUNNING_COUNT + 1))
              fi
            done

            if [ $RUNNING_COUNT -eq 3 ]; then
              echo "All 3 containers confirmed running. Safe to cleanup unused images..."
              docker system prune -a -f
              echo "Cleanup completed."
            else
              echo "WARNING: Only $RUNNING_COUNT/3 containers running. Skipping cleanup to avoid removing needed images."
            fi

            echo "=== Deployment complete ==="

  # Job 5: Health Check
  health-check:
    name: Production Health Check
    runs-on: ubuntu-latest
    needs: [deploy, rollback]
    if: ${{ always() && (needs.deploy.result == 'success' || needs.rollback.result == 'success') }}
    steps:
      - name: Wait for services
        run: sleep 15

      - name: Check Backend Health
        run: |
          for i in {1..10}; do
            response=$(curl -s -o /dev/null -w "%{http_code}" -H "Origin: https://aligndesignsllc.com" https://aligndesignsllc.com/api/v1/health || echo "000")
            if [ "$response" = "200" ]; then
              echo "Backend is healthy!"
              exit 0
            fi
            echo "Attempt $i: Backend returned $response, retrying..."
            sleep 10
          done
          echo "Backend health check failed!"
          exit 1

      - name: Check Frontend
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://aligndesignsllc.com)
          if [ "$response" = "200" ]; then
            echo "Frontend is healthy!"
          else
            echo "Frontend returned $response"
            exit 1
          fi

      - name: Notify Success
        if: success()
        run: echo "Production deployment successful!"

      - name: Notify Failure
        if: failure()
        run: |
          echo "Production deployment FAILED!"
          echo "Consider rolling back using the rollback_to input"
