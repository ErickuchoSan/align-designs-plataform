
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Backend Upstreams
    upstream backend_prod {
        server backend-prod:3001;
    }

    upstream backend_dev {
        server backend-dev:3001;
    }

    # Frontend Upstreams
    upstream frontend_prod {
        server frontend-prod:3000;
    }

    upstream frontend_dev {
        server frontend-dev:3000;
    }

    # HTTP Redirect to HTTPS (Prod)
    server {
        listen 80;
        server_name aligndesignsllc.com www.aligndesignsllc.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS (Prod)
    server {
        listen 443 ssl;
        server_name aligndesignsllc.com www.aligndesignsllc.com;

        ssl_certificate /etc/letsencrypt/live/aligndesignsllc.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/aligndesignsllc.com/privkey.pem;

        location /api {
            proxy_pass http://backend_prod;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cookie_path / "/; Secure; HttpOnly; SameSite=strict";
        }

        location / {
            proxy_pass http://frontend_prod;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # HTTP Redirect to HTTPS (Dev)
    server {
        listen 80;
        server_name dev.aligndesignsllc.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS (Dev)
    server {
        listen 443 ssl;
        server_name dev.aligndesignsllc.com;

        ssl_certificate /etc/letsencrypt/live/dev.aligndesignsllc.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dev.aligndesignsllc.com/privkey.pem;

        location /api {
            proxy_pass http://backend_dev;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            proxy_pass http://frontend_dev;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
