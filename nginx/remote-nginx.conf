# Nginx configuration for Align Designs Platform (Remote VM Version)
# Domain: aligndesigns-platform.local
# Proxying to Windows Host: 192.168.0.12

upstream backend_server {
    server 192.168.0.12:4000;
}

upstream frontend_server {
    server 192.168.0.12:3000;
}

# Main server block
server {
    listen 80;
    server_name aligndesigns-platform.local www.aligndesigns-platform.local localhost 192.168.0.139;

    # Logs to stdout/stderr for Docker
    access_log /dev/stdout;
    error_log /dev/stderr;

    client_max_body_size 2048M;
    client_body_buffer_size 128k;

    # API Backend (NestJS)
    location /api {
        proxy_pass http://backend_server;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://frontend_server;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Next.js specific - webpack HMR
    location /_next/webpack-hmr {
        proxy_pass http://frontend_server/_next/webpack-hmr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /_next/static {
        proxy_pass http://frontend_server;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, immutable";
    }
}
