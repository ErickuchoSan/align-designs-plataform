# Nginx configuration for Align Designs Platform
# Domain: aligndesigns-platform.local

# Upstream servers
upstream backend_server {
    server 127.0.0.1:4000;
}

upstream frontend_server {
    server 127.0.0.1:3000;
}

# Main server block
server {
    listen 80;
    server_name aligndesigns-platform.local www.aligndesigns-platform.local;

    # Logs
    access_log logs/aligndesigns-platform-access.log;
    error_log logs/aligndesigns-platform-error.log;

    # Increase buffer sizes for large uploads
    client_max_body_size 2048M;
    client_body_buffer_size 128k;

    # API Backend (NestJS) - Todas las rutas /api van al backend
    location /api {
        # No trailing slash in location, no URI in proxy_pass
        # This preserves the full path including /api
        proxy_pass http://backend_server;

        # Headers importantes para el backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CRITICAL: Pass cookies to backend (for JWT httpOnly cookies)
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;

        # Para WebSockets si los usas en el futuro
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts para uploads grandes
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        send_timeout 600s;
    }

    # Frontend (Next.js) - Todo lo demás va al frontend
    location / {
        proxy_pass http://frontend_server;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Para Hot Module Replacement (HMR) de Next.js
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # No cachear en desarrollo
        proxy_buffering off;
    }

    # Next.js specific - webpack HMR
    location /_next/webpack-hmr {
        proxy_pass http://frontend_server/_next/webpack-hmr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Archivos estáticos de Next.js
    location /_next/static {
        proxy_pass http://frontend_server;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, immutable";
    }
}
