version: '3.8'

services:
  postgres-dev:
    image: postgres:15-alpine
    container_name: postgres-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - dev-internal

  backend-dev:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: backend-dev
    command: pnpm start:dev
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-dev:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      NODE_ENV: development
      PORT: 3001
      FRONTEND_URL: https://dev.aligndesignsllc.com
      CORS_ORIGIN: https://dev.aligndesignsllc.com
      MINIO_ENDPOINT: minio-dev
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_USE_SSL: false
      MINIO_BUCKET: ${MINIO_BUCKET}
    depends_on:
      - postgres-dev
      - minio-dev
    networks:
      - dev-internal
      - web-proxy
    restart: always

  minio-dev:
    image: minio/minio
    container_name: minio-dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data_dev:/data
    networks:
      - dev-internal
    restart: always

  frontend-dev:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: frontend-dev
    environment:
      NEXT_PUBLIC_API_URL: https://dev.aligndesignsllc.com/api
      NODE_ENV: development
    depends_on:
      - backend-dev
    networks:
      - web-proxy
    restart: always

networks:
  dev-internal:
    driver: bridge
  web-proxy:
    external: true

volumes:
  postgres_data_dev:
  minio_data_dev:
