version: '3.8'

services:
  postgres-dev:
    image: postgres:15-alpine
    container_name: postgres-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - dev-internal

  backend-dev:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: backend-dev
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-dev:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      NODE_ENV: development
      PORT: 3001
      FRONTEND_URL: https://dev.aligndesignsllc.com
      CORS_ORIGIN: https://dev.aligndesignsllc.com,http://45.55.71.127
      ALLOWED_ORIGINS: https://dev.aligndesignsllc.com,http://45.55.71.127
      MINIO_ENDPOINT: minio-dev
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_USE_SSL: false
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-}
      MINIO_PUBLIC_PORT: ${MINIO_PUBLIC_PORT:-443}
      MINIO_PUBLIC_USE_SSL: ${MINIO_PUBLIC_USE_SSL:-true}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
    depends_on:
      - postgres-dev
      - minio-dev
    networks:
      - dev-internal
      - web-proxy
    restart: always

  minio-dev:
    image: minio/minio
    container_name: minio-dev
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data_dev:/data
    networks:
      - dev-internal
    restart: always

  frontend-dev:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://dev.aligndesignsllc.com/api
    container_name: frontend-dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - backend-dev
    networks:
      - web-proxy
    restart: always

networks:
  dev-internal:
    driver: bridge
  web-proxy:
    external: true

volumes:
  postgres_data_dev:
  minio_data_dev:
