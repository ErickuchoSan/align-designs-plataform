version: '3.8'

services:
  postgres-dev:
    image: postgres:15-alpine
    container_name: postgres-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - dev-internal

  backend-dev:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: backend-dev
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-dev:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      NODE_ENV: development
      PORT: 3001
      FRONTEND_URL: https://dev.aligndesignsllc.com
      CORS_ORIGIN: https://dev.aligndesignsllc.com,http://144.126.221.76
      ALLOWED_ORIGINS: https://dev.aligndesignsllc.com,http://144.126.221.76
      # DigitalOcean Spaces (S3-compatible storage)
      STORAGE_ENDPOINT: sfo3.digitaloceanspaces.com
      STORAGE_PORT: 443
      STORAGE_ACCESS_KEY: ${DO_SPACES_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${DO_SPACES_SECRET_KEY}
      STORAGE_USE_SSL: true
      STORAGE_BUCKET: aligndesigns-dev
      STORAGE_REGION: sfo3
      STORAGE_SKIP_BUCKET_CHECK: true
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
    depends_on:
      - postgres-dev
    networks:
      - dev-internal
      - web-proxy
    restart: always

  frontend-dev:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://dev.aligndesignsllc.com/api
    container_name: frontend-dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - backend-dev
    networks:
      - web-proxy
    restart: always

networks:
  dev-internal:
    driver: bridge
  web-proxy:
    external: true

volumes:
  postgres_data_dev:
