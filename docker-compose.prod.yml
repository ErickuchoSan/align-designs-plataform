version: '3.8'

services:
  postgres-prod:
    image: postgres:15-alpine
    container_name: postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - prod-internal
    restart: always

  backend-prod:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: backend-prod
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-prod:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      NODE_ENV: production
      PORT: 3001
      FRONTEND_URL: https://aligndesignsllc.com
      CORS_ORIGIN: https://aligndesignsllc.com,https://www.aligndesignsllc.com
      ALLOWED_ORIGINS: https://aligndesignsllc.com,https://www.aligndesignsllc.com
      # DigitalOcean Spaces (S3-compatible storage)
      STORAGE_ENDPOINT: sfo3.digitaloceanspaces.com
      STORAGE_PORT: 443
      STORAGE_ACCESS_KEY: ${DO_SPACES_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${DO_SPACES_SECRET_KEY}
      STORAGE_USE_SSL: true
      STORAGE_BUCKET: aligndesigns-prod
      STORAGE_REGION: sfo3
      STORAGE_SKIP_BUCKET_CHECK: true
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
    depends_on:
      - postgres-prod
    networks:
      - prod-internal
      - web-proxy
    restart: always

  frontend-prod:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://aligndesignsllc.com/api
    container_name: frontend-prod
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - backend-prod
    networks:
      - web-proxy
    restart: always

networks:
  prod-internal:
    driver: bridge
  web-proxy:
    external: true

volumes:
  postgres_data_prod:
