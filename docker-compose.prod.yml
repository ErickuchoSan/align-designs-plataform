version: '3.8'

services:
  postgres-prod:
    image: postgres:15-alpine
    container_name: postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - prod-internal

  backend-prod:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: backend-prod
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-prod:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      NODE_ENV: production
      PORT: 3001
      FRONTEND_URL: https://aligndesignsllc.com
      CORS_ORIGIN: https://aligndesignsllc.com
      MINIO_ENDPOINT: minio-prod
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_USE_SSL: false
      MINIO_BUCKET: align-designs
    depends_on:
      - postgres-prod
      - minio-prod
    networks:
      - prod-internal
      - web-proxy
    restart: always

  minio-prod:
    image: minio/minio
    container_name: minio-prod
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data_prod:/data
    networks:
      - prod-internal
    restart: always

  frontend-prod:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: frontend-prod
    environment:
      NEXT_PUBLIC_API_URL: https://aligndesignsllc.com/api
      NODE_ENV: production
    depends_on:
      - backend-prod
    networks:
      - web-proxy
    restart: always

networks:
  prod-internal:
    driver: bridge
  web-proxy:
    external: true

volumes:
  postgres_data_prod:
  minio_data_prod:
